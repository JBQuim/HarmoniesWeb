<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Harmonies MVP</title>
  <style>
    :root {
      --page-bg: #2b2419;
      --bar-bg: #eee2c6;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--page-bg);
      font-family: system-ui, sans-serif;
      color: black;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .topbar {
      width: min(720px, 100vw);
      box-sizing: border-box;
      padding: 12px;
      display: flex;
      gap: 8px;
      align-items: center;
      background: var(--bar-bg);
      flex-wrap: wrap;
    }

    .topbar input {
      width: 110px;
      padding: 6px 8px;
      font: inherit;
    }

    .topbar button {
      padding: 7px 10px;
      font: inherit;
      cursor: pointer;
    }

    .topbar .spacer { flex: 1; }

    #canvas {
      display: block;
      background: #7d6847;
      touch-action: manipulation;
      max-width: 100vw;
      height: auto;
    }

    #status {
      width: min(720px, 100vw);
      box-sizing: border-box;
      margin: 0;
      padding: 8px 12px 14px;
      background: var(--bar-bg);
      color: #211b12;
      font: 12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      white-space: pre-wrap;
      min-height: 1.2em;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <strong>Harmonies</strong>
    <label>
      Game
      <input id="gameId" value="test1">
    </label>
    <label>
      Seed
      <input id="seed" type="number" value="0">
    </label>
    <button id="newGameBtn" type="button">New Game</button>
    <button id="localGameBtn" type="button">Local New Game</button>
    <div class="spacer"></div>
    <button id="redrawBtn" type="button">Redraw</button>
  </div>

  <canvas id="canvas" width="720" height="648"></canvas>
  <pre id="status"></pre>

  <script type="module" src="./main.js"></script>
</body>
</html>
