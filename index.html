<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Harmonies MVP</title>

  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 720px;
      margin: 4rem auto;
      padding: 0 1rem;
      line-height: 1.5;
    }

    .board {
      display: flex;
      gap: 3rem;
      align-items: center;
      margin-top: 3rem;
    }

    button {
      border: 0;
      background: transparent;
      cursor: pointer;
      font: inherit;
    }

    .circle {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: black;
    }

    .square {
      width: 140px;
      height: 140px;
      background: black;
    }

    .label {
      text-align: center;
      margin-top: 0.75rem;
      font-weight: 600;
    }

    .status {
      margin-top: 3rem;
      padding: 1rem;
      border: 2px solid black;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>
  <h1>Harmonies MVP</h1>
  <p>Click a shape. The browser will send an HTTP request to the Python Worker.</p>

  <div class="board">
    <button type="button" data-shape="circle">
      <div class="circle"></div>
      <div class="label">Circle</div>
    </button>

    <button type="button" data-shape="square">
      <div class="square"></div>
      <div class="label">Square</div>
    </button>
  </div>

  <div class="status" id="status">Status: nothing clicked yet.</div>

  <script>
    const API_URL = "https://harmonies-api.joaquinbaixerasbuye.workers.dev/click";
    const statusBox = document.getElementById("status");

    async function sendShapeClick(shape) {
      statusBox.textContent = `Status: sending ${shape} click...`;

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            shape: shape
          })
        });

        const data = await response.json();

        if (!response.ok) {
          statusBox.textContent = `Status: Worker error\n${JSON.stringify(data, null, 2)}`;
          return;
        }

        statusBox.textContent = `Status: success\n${JSON.stringify(data, null, 2)}`;
      } catch (error) {
        statusBox.textContent = `Status: request failed\n${error}`;
      }
    }

    for (const button of document.querySelectorAll("button[data-shape]")) {
      button.addEventListener("click", () => {
        sendShapeClick(button.dataset.shape);
      });
    }
  </script>
</body>
</html>
